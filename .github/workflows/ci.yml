name: N64 Build & Test Pipeline

on:
  push:
    branches:
      - main
      - master
    tags:
      - 'v*'
  pull_request:
    branches:
      - main
      - master

jobs:
  build-and-test:
    name: Compile ROM and Run Headless Verification
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up QEMU for multiarch execution
        uses: docker/setup-qemu-action@v3
        with:
          platforms: amd64

      - name: Build ROM
        run: |
          docker run --rm \
            -v ${{ github.workspace }}:/libdragon \
            -u $(id -u):$(id -g) \
            anacierdem/libdragon:latest \
            make

      - name: Run Headless ROM Testing
        run: |
          chmod +x scripts/test_headless.sh
          ./scripts/test_headless.sh

      - name: Upload ROM Artifact
        uses: actions/upload-artifact@v4
        with:
          name: game-rom
          path: game.z64
          if-no-files-found: error

  release:
    name: Package and Release Version
    needs: build-and-test
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up QEMU for multiarch execution
        uses: docker/setup-qemu-action@v3
        with:
          platforms: amd64

      - name: Run Release Packaging
        run: |
          chmod +x scripts/release.sh
          ./scripts/release.sh

      - name: Extract Release Version
        id: get_version
        run: |
          VERSION=${GITHUB_REF#refs/tags/}
          echo "version=${VERSION}" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: kintsugi64-*.tar.gz
          body_path: RELEASE_NOTES.md
          name: Release ${{ steps.get_version.outputs.version }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
